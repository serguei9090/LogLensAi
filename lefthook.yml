pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: bun run lint {staged_files}
    ruff:
      glob: "*.py"
      run: uv run ruff check {staged_files}

post-commit:
  commands:
    codanna-index:
      run: powershell -NoProfile -Command "uv run python scripts/codanna/index.py (git diff-tree --no-commit-id --name-only -r HEAD)"
    doc-agent:
      run: powershell -NoProfile -Command "$files = git diff-tree --no-commit-id --name-only -r HEAD | Out-String; if ($files.Trim()) { gemini -y -p \"Run @doc-agent to update docs/track/ and TODOC based on these changed files: `n$files\" }"
