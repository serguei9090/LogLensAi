pre-commit:
  commands:
    lint-agent:
      run: gemini -y -p "Run @lint-agent on modified files to ensure SoftwareStandards.md and Quality.md compliance before commit."

post-commit:
  commands:
    doc-agent:
      run: gemini -y -p "Run @doc-agent to update docs/track/ and TODOC based on the recent commit changes to maintain living specs."
