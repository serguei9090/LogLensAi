pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: bun run lint {staged_files}
    ruff:
      glob: "*.py"
      run: uv run ruff check {staged_files}
      fail_on_error: true

post-commit:
  commands:
    # Unified cross-platform hook via Python
    # Works on Windows, Linux, and macOS
    codanna-index:
      # Use --latest to get files from the commit just created
      run: uv run python scripts/codanna/index.py --latest
