pre-commit:
  commands:
    lint-agent:
      run: powershell -Command "Start-Process powershell -ArgumentList '-NoProfile -Command \"gemini -y -p \"\"Run @lint-agent on modified files to ensure SoftwareStandards.md and Quality.md compliance before commit.\"\"\"' -NoNewWindow"

post-commit:
  commands:
    doc-agent:
      run: powershell -Command "Start-Process powershell -ArgumentList '-NoProfile -Command \"gemini -y -p \"\"Run @doc-agent to update docs/track/ and TODOC based on the recent commit changes to maintain living specs.\"\"\"' -NoNewWindow"
