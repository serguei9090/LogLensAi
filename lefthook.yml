pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: bun run lint {staged_files}
    ruff:
      glob: "*.py"
      run: uv run ruff check {staged_files}

post-commit:
  commands:
    codanna-index:
      # Use git diff-tree to get files from the commit just created
      run: uv run python scripts/codanna/index.py $(git diff-tree --no-commit-id --name-only -r HEAD)
    doc-agent:
      run: powershell -NoProfile -Command "$files = git diff-tree --no-commit-id --name-only -r HEAD | Out-String; gemini -y -p \"Run @doc-agent to update docs/track/ and TODOC based on these changed files: `n$files\""
